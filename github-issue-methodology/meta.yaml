description: "Systematic methodology for addressing GitHub issues: investigate, fix, validate, and merge PRs quickly (6-12 hours from issue to merge)."

contract:
  - "Low-interaction autonomous workflow; agent researches before asking."
  - "Always reads existing test patterns before writing new tests."
  - "Ships within 6-12 hours from issue to PR submission."
  - "SKILL.md is a router; details in references/ (CORE_PRINCIPLES, INVESTIGATE, PITFALLS)."
  - "Requires explicit issue URL for investigate subcommand."

