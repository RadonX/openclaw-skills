name: skill-distiller
version: "0.2.0"
status: stable
owner: RadonX
created: "2026-02-08"
updated: "2026-02-10"

description: "Distill a repeatable OpenClaw skill from a successful conversation history. Use when you want to turn \"we did this once successfully\" into a reusable skill (SKILL.md + references/), capturing the corrections and the final accepted shape."

contract:
  - "Analyzes conversation history (initial state → corrections → final accepted state)."
  - "Abstracts principles from corrections; never copies verbatim."
  - "Follows progressive disclosure: lean SKILL.md router + references/ for detailed logic."
  - "Proposal-first before writing final artifacts."
  - "Writes output to ~/repo/config/openclaw/skills/<name>/."

provenance:
  created:
    date: "2026-02-08"
    model: ""
    method: git-history
