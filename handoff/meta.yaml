description: "Create handoff documentation (temporary state transfer + optional work log) in a shared Obsidian vault. Use when you need to hand work to a future human/agent, when the user says \"handoff\", \"hand off\", or \"create a handoff\"."

contract:
  - "Subcommand-first CLI: new / update / know / load / help."
  - "SKILL.md acts as router; details in references/ (progressive disclosure)."
  - "Knowledge updates (know) are proposal-first; require explicit apply."
  - "load is read-only context primer; accepts project name only (not full paths)."
  - "--ask flag flips to confirmation-heavy mode."

