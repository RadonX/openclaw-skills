name: commit-message
version: "0.1.0"
status: stable
owner: RadonX
created: "2026-02-04"
updated: "2026-02-04"

description: "Draft a high-quality Conventional Commit message narrative from git diffs + chat context, and optionally apply it via git commit/--amend. Use when the user asks for a commit message, wants to amend a message, or says \"hg-commit\"/\"git commit message\"."

contract:
  - "Proposal-only by default; --apply required to execute git commit."
  - "Supports --amend for amending the last commit."
  - "Never runs git push."
  - "Requires explicit user confirmation before modifying the repo."

