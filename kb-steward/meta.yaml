name: kb-steward
version: "0.2.0"
status: stable
owner: RadonX
created: "2026-02-11"
updated: "2026-03-09"

description: "Per-agent Obsidian KB steward: auto-bootstrap folders/READMEs/templates and ingest links/snippets into notes (Projects/Areas/Research) with lightweight related-doc linking."

contract:
  - "Subcommands: add / doctor / bootstrap."
  - "Additive-only: never overwrites existing content."
  - "Minimal chat noise: replies are path-only."
  - "Taxonomy is evolvable; new tags/fields recorded in folder README."
  - "Default kbRoot: <workspace>/knowledge."
  - "Project structure: 10-Projects/(active|completed|backlog|templates), each with PROJECT.md + tasks/ + references/."

provenance:
  created:
    date: "2026-02-11"
    model: ""
    method: git-history
