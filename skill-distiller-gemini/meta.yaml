name: skill-distiller-gemini
version: "0.1.0"
status: draft
owner: RadonX
created: "2026-02-10"
updated: "2026-02-10"

description: "Synthesizes a new OpenClaw skill by analyzing a conversation history, distilling principles from the interaction, and structuring the output according to best practices. Use when creating a new skill from a successful workflow."

contract:
  - "Analyzes conversation history (initial state → corrections → final state)."
  - "Abstracts principles from corrections; never copies verbatim."
  - "Outputs structured skill with progressive disclosure (SKILL.md router + references/)."
  - "Proposal-first; requires explicit user request before writing files."
  - "Always reads references/PRINCIPLES.md before synthesis."

