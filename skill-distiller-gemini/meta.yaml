description: 'Synthesizes a new OpenClaw skill by analyzing a conversation history, distilling principles from the interaction, and structuring the output according to best practices. Use when creating a new skill from a successful workflow.'

contract:
  - 'Distills a successful conversation history into a reusable OpenClaw skill.'
  - 'Emphasizes extracting user corrections/constraints and the final accepted artifact.'
  - 'Default is proposal-only; apply/write requires explicit user request.'
  - 'Always consults principles reference before synthesis.'

